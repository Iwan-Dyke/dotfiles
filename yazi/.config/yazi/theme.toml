# Matrix theme for yazi
# Palette: bg=#000000, primary=#00ff41, mid=#33ff77, dk=#00cc33,
#          accent=#66ff99, muted=#006622, subtle=#001a00,
#          white=#ffffff, red=#cc0000, orange=#ff6600

[app]
overall = { bg = "#000000" }

# ── File manager ──────────────────────────────────────────────
[mgr]
cwd             = { fg = "#00ff41", bold = true }
find_keyword    = { fg = "#000000", bg = "#00ff41", bold = true }
find_position   = { fg = "#00cc33", italic = true }
symlink_target  = { fg = "#006622", italic = true }
marker_copied   = { fg = "#66ff99" }
marker_cut      = { fg = "#cc0000" }
marker_marked   = { fg = "#ff6600" }
marker_selected = { fg = "#00ff41" }
count_copied    = { fg = "#000000", bg = "#66ff99" }
count_cut       = { fg = "#000000", bg = "#cc0000" }
count_selected  = { fg = "#000000", bg = "#00ff41" }
border_symbol   = "│"
border_style    = { fg = "#006622" }

# ── Indicator bar (controls hovered row highlight) ────────────
[indicator]
parent  = { fg = "#006622", reversed = true }
current = { fg = "#ffffff", bg = "#003300", bold = true }
preview = { fg = "#006622", underline = true }

# ── Tabs ──────────────────────────────────────────────────────
[tabs]
active   = { fg = "#000000", bg = "#00ff41", bold = true }
inactive = { fg = "#006622", bg = "#000000" }

# ── Mode indicator (bottom-left) ──────────────────────────────
[mode]
normal_main = { fg = "#000000", bg = "#00ff41", bold = true }
normal_alt  = { fg = "#00ff41", bg = "#001a00" }
select_main = { fg = "#000000", bg = "#ff6600", bold = true }
select_alt  = { fg = "#ff6600", bg = "#001a00" }
unset_main  = { fg = "#000000", bg = "#cc0000", bold = true }
unset_alt   = { fg = "#cc0000", bg = "#001a00" }

# ── Status bar ────────────────────────────────────────────────
[status]
overall        = { bg = "#000000" }
sep_left       = { open = "", close = "" }
sep_right      = { open = "", close = "" }
perm_type      = { fg = "#00ff41", bold = true }
perm_read      = { fg = "#00cc33" }
perm_write     = { fg = "#ff6600" }
perm_exec      = { fg = "#cc0000" }
perm_sep       = { fg = "#006622" }
progress_label = { fg = "#ffffff", bold = true }
progress_normal = { fg = "#00ff41", bg = "#001a00" }
progress_error  = { fg = "#cc0000", bg = "#001a00" }

# ── Which-key popup ───────────────────────────────────────────
[which]
cols            = 3
mask            = { bg = "#000000" }
cand            = { fg = "#00ff41" }
rest            = { fg = "#006622" }
desc            = { fg = "#33ff77" }
separator       = " → "
separator_style = { fg = "#006622" }

# ── Confirm dialog ────────────────────────────────────────────
[confirm]
border = { fg = "#00ff41" }
title  = { fg = "#00ff41", bold = true }
body   = { fg = "#33ff77" }
list   = { fg = "#33ff77" }
btn_yes = { fg = "#000000", bg = "#00ff41", bold = true }
btn_no  = { fg = "#000000", bg = "#cc0000", bold = true }

# ── Spot panel ────────────────────────────────────────────────
[spot]
border   = { fg = "#006622" }
title    = { fg = "#00ff41", bold = true }
tbl_col  = { fg = "#00ff41", reversed = true }
tbl_cell = { fg = "#00ff41", reversed = true }

# ── Notifications ─────────────────────────────────────────────
[notify]
title_info  = { fg = "#00ff41" }
title_warn  = { fg = "#ff6600" }
title_error = { fg = "#cc0000" }

# ── Pick menu ─────────────────────────────────────────────────
[pick]
border   = { fg = "#00ff41" }
active   = { fg = "#000000", bg = "#00ff41", bold = true }
inactive = { fg = "#33ff77" }

# ── Input dialog ──────────────────────────────────────────────
[input]
border   = { fg = "#00ff41" }
title    = { fg = "#00ff41", bold = true }
value    = { fg = "#ffffff" }
selected = { fg = "#000000", bg = "#00ff41" }

# ── Completion menu ───────────────────────────────────────────
[cmp]
border   = { fg = "#006622" }
active   = { fg = "#000000", bg = "#00ff41" }
inactive = { fg = "#33ff77" }

# ── Tasks panel ───────────────────────────────────────────────
[tasks]
border  = { fg = "#006622" }
title   = { fg = "#00ff41", bold = true }
hovered = { fg = "#000000", bg = "#00ff41" }

# ── Help panel ────────────────────────────────────────────────
[help]
on      = { fg = "#00ff41", bold = true }
run     = { fg = "#33ff77" }
desc    = { fg = "#006622" }
hovered = { fg = "#000000", bg = "#00ff41" }
footer  = { fg = "#006622" }

# ── File type colours ─────────────────────────────────────────
[filetype]
rules = [
    { url = "*/", fg = "#00ff41", bold = true },
    { url = "*", is = "link",   fg = "#00cc33", italic = true },
    { url = "*", is = "orphan", fg = "#cc0000", italic = true },
    { url = "*", is = "exec", fg = "#66ff99", bold = true },
    { url = "*", is = "sock",  fg = "#006622" },
    { url = "*", is = "fifo",  fg = "#006622" },
    { url = "*", is = "block", fg = "#006622" },
    { url = "*", is = "char",  fg = "#006622" },
    { mime = "image/*",          fg = "#33ff77" },
    { mime = "{audio,video}/*",  fg = "#00cc33" },
    { mime = "application/pdf",  fg = "#33ff77" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*}", fg = "#ff6600" },
    { url = "*", fg = "#33ff77" },
]
