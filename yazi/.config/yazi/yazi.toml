# Yazi config

[mgr]
show_hidden   = true
show_symlink  = true
sort_by       = "natural"
sort_dir_first = true
sort_sensitive = false
linemode      = "size"
scrolloff     = 8

[preview]
wrap     = "no"
tab_size = 4

[opener]
edit = [
    { run = "$EDITOR %s", block = true, for = "unix" },
]

[open]
prepend_rules = [
    { mime = "text/*",             use = "edit" },
    { mime = "application/json",   use = "edit" },
    { url  = "*.toml",            use = "edit" },
    { url  = "*.yaml",            use = "edit" },
    { url  = "*.yml",             use = "edit" },
    { url  = "*.md",              use = "edit" },
    { url  = "*.py",              use = "edit" },
    { url  = "*.tf",              use = "edit" },
    { url  = "*.sh",              use = "edit" },
    { url  = "*.sql",             use = "edit" },
    { url  = "*.lua",             use = "edit" },
    { url  = "*.go",              use = "edit" },
]
