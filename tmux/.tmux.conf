# Terminal settings — fixes Neovim rendering issues
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -s escape-time 10
setw -g aggressive-resize on

# Mouse support (scroll, click panes, resize)
set -g mouse on

# Vi keys in copy mode (scroll with k/j, half-page with C-u/C-d)
set-window-option -g mode-keys vi

# Increase scrollback buffer (default is 2000)
set -g history-limit 10000

# Ensure alternate screen buffer is used (fixes Neovim overlap)
set -g alternate-screen on

# Status bar
set -g status on
set -g status-style 'bg=black,fg=white'
set -g window-status-current-style 'fg=white,bold'
set -g window-status-style 'fg=white'

# Command prompt / confirmation messages (kill-session, etc.)
set -g message-style 'bg=black,fg=white'
set -g message-command-style 'bg=black,fg=white'

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Redraw status bar on window/focus changes (fixes duplication after switching)
set-hook -g client-focus-in 'refresh-client -S'
set-hook -g window-pane-changed 'refresh-client -S'
